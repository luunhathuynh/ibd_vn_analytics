data:
  default_history_years: 3
  indexes:
    - VNINDEX
    - VN30
    - HNXINDEX
    - UPCOMINDEX

provider:
  max_requests_per_minute: 0
  retry_attempts: 1
  retry_backoff_seconds: 0
  fallback_after_consecutive_failures: 3
  min_real_stock_success_ratio: 0.0
  allow_demo_fallback_for_cli: true
  allow_demo_fallback_for_api: false
# provider:
#   max_requests_per_minute: 18
#   retry_attempts: 3
#   retry_backoff_seconds: 2.0
#   fallback_after_consecutive_failures: 5
#   min_real_stock_success_ratio: 0.7

universe:
  min_avg_trading_value_20d: 10000000000
  min_history_sessions: 252

indicators:
  ma_windows: [10, 20, 50, 150, 200]
  rsi_window: 14
  atr_window: 14
  avg_volume_window: 20
  high_52w_sessions: 252

relative_strength:
  periods:
    one_month: 21
    three_months: 63
    six_months: 126
  weights:
    one_month: 0.2
    three_months: 0.5
    six_months: 0.3

breakout:
  high_windows: [20, 50]
  min_volume_ratio: 1.5
  stop_loss_pct: 7.0

market_status:
  benchmark: VNINDEX
  distribution_day:
    lookback_sessions: 25
    min_price_drop_pct: 0.2
    volume_must_exceed_previous: true
  rally_attempt:
    min_gain_pct_for_day1: 0.0
    reset_if_undercut_low: true
    min_day_for_follow_through: 4
  follow_through_day:
    min_gain_pct: 1.5
    volume_must_exceed_previous: true
  pressure_rules:
    distribution_days_for_under_pressure: 4
    distribution_days_for_correction: 6
  drop_distribution_day:
    expire_after_sessions: 25
    drop_if_index_gain_from_dd_close_pct: 5.0
  severe_selloff:
    min_price_drop_pct: 1.5
    volume_must_exceed_previous: true
  strong_recovery:
    min_gain_pct: 1.5
    volume_must_exceed_previous: true

screeners:
  top_leaders_limit: 20
  breakout_limit: 30
  watchlist_limit: 30
  warning_limit: 30
  min_leader_rs_score: 70
  near_buy_high_pct: 15.0
  warning_drop_pct: 3.0
  warning_volume_ratio: 1.5
  leading_sectors_limit: 10

api:
  host: "127.0.0.1"
  port: 8000
  auth_enabled: false
  api_key_env: IBD_API_KEY

integrations:
  canslim:
    enabled: false
    input_path: "../canslim/output/latest_summary.json"
  payback:
    enabled: false
    input_path: "../payback/output/filter_results.json"
  candlestick:
    enabled: false
    api_base_url: "http://127.0.0.1:8001"
    api_key_env: CANDLESTICK_API_KEY

fusion:
  weights:
    market: 0.25
    technical: 0.35
    canslim: 0.20
    valuation: 0.10
    timing: 0.10
  min_rr_for_actionable: 1.5
  rs_strong_threshold: 70
